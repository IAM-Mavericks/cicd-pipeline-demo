name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 158988874502.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_IMAGE: sznpay-backend
  FRONTEND_IMAGE: sznpay-frontend

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm@8.10.0
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile
      - name: Run linter
        working-directory: frontend
        run: pnpm lint
        continue-on-error: true

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, and push backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.backend -t $ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG -t $ECR_REGISTRY/$BACKEND_IMAGE:latest .
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, and push frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.frontend -t $ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG -t $ECR_REGISTRY/$FRONTEND_IMAGE:latest .
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          echo "$EC2_SSH_KEY" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Write env file locally first
          cat > /tmp/sznpay.env << ENVEOF
          NODE_ENV=production
          JWT_SECRET=${JWT_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          MONGODB_URI=${MONGODB_URI}
          ENVEOF

          # Copy env file to server
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            /tmp/sznpay.env $EC2_USER@$EC2_HOST:/home/ec2-user/sznpay.env

          # Deploy containers
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST 'bash -s' << 'COMMANDS'
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 158988874502.dkr.ecr.us-east-1.amazonaws.com
          docker pull 158988874502.dkr.ecr.us-east-1.amazonaws.com/sznpay-backend:latest
          docker pull 158988874502.dkr.ecr.us-east-1.amazonaws.com/sznpay-frontend:latest
          docker stop sznpay-backend sznpay-frontend 2>/dev/null || true
          docker rm sznpay-backend sznpay-frontend 2>/dev/null || true
          docker run -d --name sznpay-backend --restart unless-stopped -p 3001:3001 \
            --env-file /home/ec2-user/sznpay.env \
            158988874502.dkr.ecr.us-east-1.amazonaws.com/sznpay-backend:latest
          docker run -d --name sznpay-frontend --restart unless-stopped -p 80:80 \
            158988874502.dkr.ecr.us-east-1.amazonaws.com/sznpay-frontend:latest
          sleep 10
          docker ps | grep sznpay
          COMMANDS
          rm -f /tmp/deploy_key /tmp/sznpay.env
