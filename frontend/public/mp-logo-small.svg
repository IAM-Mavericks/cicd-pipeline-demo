<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient Ring: Blue -> Purple -> Pink -> Cyan -->
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8CFF;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#8B7FFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B87FFF;stop-opacity:1" />
      <stop offset="62%" style="stop-color:#E879D9;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="87%" style="stop-color:#7DD3C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <!-- MP Text Gradient: Green -> Cyan -> Blue -->
    <linearGradient id="mpTextGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glowSmall" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Glow -->
  <circle cx="20" cy="20" r="18" fill="none" stroke="url(#ringGradient)" stroke-width="1.5" opacity="0.3" filter="url(#glowSmall)"/>
  
  <!-- Main Gradient Ring -->
  <circle cx="20" cy="20" r="17" fill="none" stroke="url(#ringGradient)" stroke-width="3" opacity="0.95"/>
  
  <!-- Inner White/Light Circle -->
  <circle cx="20" cy="20" r="14.5" fill="#F0F4FF" opacity="0.98"/>
  
  <!-- MP Text -->
  <text x="20" y="26.5" font-family="Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle" fill="url(#mpTextGradient)" letter-spacing="-0.5">MP</text>
</svg>
